<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Bangla View Zone</title>
<script src="admin-data.js"></script>

<style>
body{
margin:0;
font-family:sans-serif;
background:#0f172a;
color:white;
}

/* Header */
.header{
display:flex;
justify-content:space-between;
padding:10px;
background:#020617;
}
.logo{
  <div class="logo">📺 Bangla View Zone</div>
font-size:20px;
font-weight:bold;
}

/* Banner */
.banner{
background:url('background:url('https://images.unsplash.com/...');');
height:150px;
background-size:cover;
display:flex;
align-items:center;
padding:10px;
font-size:18px;
}

/* Category */
.row{
padding:10px;
}
.row h3{
margin:5px;
}

/* Horizontal scroll */
.scroll{
display:flex;
overflow-x:auto;
gap:10px;
}

.card{
min-width:100px;
background:#1e293b;
padding:10px;
border-radius:10px;
text-align:center;
cursor:pointer;
}

.card img{
width:60px;
}

/* Player */
iframe{
width:100%;
height:200px;
border:none;
}
</style>
</head>

<body>

<div class="header">
<div class="logo">📺 Bangla View Zone</div>
</div>

<div class="banner">Watch Live TV Anytime</div>

<iframe id="player"></iframe>

<div class="row">
<h3>📰 News</h3>
<div class="scroll" id="news"></div>
</div>

<div class="row">
<h3>⚽ Sports</h3>
<div class="scroll" id="sports"></div>
</div>

<div class="row">
<h3>🕌 Islamic</h3>
<div class="scroll" id="islamic"></div>
</div>

<script>

function play(link){
document.getElementById("player").src=link;
}

function load(){
["news","sports","islamic"].forEach(cat=>{
let html="";
channels.filter(c=>c.cat==cat).forEach(c=>{
html+=`<div class="card" onclick="play('${c.link}')">
<img src="${c.img}"><br>${c.name}</div>`;
});
document.getElementById(cat).innerHTML=html;
});
}

load();

</script>

</body>
</html>
