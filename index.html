<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla View Zone - Live TV</title>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; overflow-x: hidden; }
        
        .header { 
            background: linear-gradient(90deg, #1a1a1a, #333, #1a1a1a);
            padding: 20px; text-align: center; font-size: 24px; font-weight: bold; 
            border-bottom: 2px solid #ff0000; color: #fff; text-shadow: 0 0 10px #ff0000;
        }

        /* ইউনিক প্লেয়ার কন্টেইনার */
        .player-container { 
            width: 95%; max-width: 850px; margin: 25px auto; background: #000; 
            aspect-ratio: 16/9; border-radius: 15px; overflow: hidden;
            box-shadow: 0 0 30px rgba(255, 0, 0, 0.4); border: 1px solid #333;
        }
        iframe { width: 100%; height: 100%; border: none; }

        .grid-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
            gap: 20px; padding: 30px; max-width: 1200px; margin: 0 auto;
        }

        /* ইউনিক পপ-আপ বাটন ডিজাইন */
        .channel-card {
            background: #ffffff; border-radius: 12px; padding: 12px;
            text-align: center; cursor: pointer; position: relative;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }

        /* মাল্টিকালার পপ-আপ ইফেক্ট */
        .channel-card:hover {
            transform: scale(1.1) translateY(-10px);
            background: #fff;
            animation: rainbowBorder 1.5s linear infinite;
            box-shadow: 0 15px 30px rgba(255, 255, 255, 0.2);
        }

        @keyframes rainbowBorder {
            0% { border-color: #ff0000; box-shadow: 0 0 15px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 15px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 15px #0000ff; }
            100% { border-color: #ff00ff; box-shadow: 0 0 15px #ff00ff; }
        }

        .channel-card img { width: 100%; height: 60px; object-fit: contain; border-radius: 5px; }
        .channel-card p { color: #111; font-size: 13px; margin: 10px 0 0; font-weight: bold; }

    </style>
</head>
<body>

    <div class="header">📺 BANGLA VIEW ZONE - LIVE</div>

    <div class="player-container">
        <iframe id="main-player" src="https://www.youtube.com/embed/live_stream?channel=UC_u6v2At6p3-w8YvT2Zpndw&autoplay=1" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="grid-container">
        
        <div class="channel-card" onclick="changeVideo('UC_u6v2At6p3-w8YvT2Zpndw')">
            <img src="https://upload.wikimedia.org/wikipedia/en/thumb/e/e0/Jamuna_TV_logo.png/200px-Jamuna_TV_logo.png">
            <p>Jamuna TV</p>
        </div>

        <div class="channel-card" onclick="changeVideo('UCIsP6W279isZAsD_CAdWOTw')">
            <img src="https://upload.wikimedia.org/wikipedia/en/2/26/Somoy_TV_logo.png">
            <p>Somoy TV</p>
        </div>

        <div class="channel-card" onclick="changeVideo('UCXvL_n_6UunYvO0Y9B8A88g')">
            <img src="https://upload.wikimedia.org/wikipedia/commons/e/e2/Channel_24_logo.png">
            <p>Channel 24</p>
        </div>

        <div class="channel-card" onclick="changeVideo('UCpP0S9N-uS7M9y8v_K6v4tQ')">
            <img src="https://upload.wikimedia.org/wikipedia/en/0/05/Independent_Television_logo.png">
            <p>Independent</p>
        </div>

        <div class="channel-card" onclick="changeVideo('UCd7N7G7_A2YOfpYp-7uK3kg')">
            <img src="https://upload.wikimedia.org/wikipedia/en/c/c3/Ekattor_TV_logo.png">
            <p>Ekattor TV</p>
        </div>

        <div class="channel-card" onclick="changeVideo('UCG_UshSOn0HCHV_0q8X7Wdg')">
            <img src="https://upload.wikimedia.org/wikipedia/en/2/21/News24_Bangladesh_logo.png">
            <p>News 24</p>
        </div>

    </div>

    <script>
        function changeVideo(channelId) {
            // নতুন নিয়মে এমবেড লিঙ্ক জেনারেট করা
            const newUrl = "https://www.youtube.com/embed/live_stream?channel=" + channelId + "&autoplay=1";
            document.getElementById('main-player').src = newUrl;
            
            // স্ক্রল করে উপরে নিয়ে যাওয়া
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }
    </script>

</body>
</html>
