<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla View Zone - Live TV</title>
    <link href="https://vjs.zencdn.net/7.20.3/video-js.css" rel="stylesheet" />
    <script src="https://vjs.zencdn.net/7.20.3/video.min.js"></script>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Segoe UI', sans-serif; margin: 0; padding: 0; }
        .header { background: #1a1a1a; padding: 15px; text-align: center; font-size: 22px; font-weight: bold; border-bottom: 3px solid #ff0000; color: #fff; }
        .player-container { width: 100%; max-width: 900px; margin: 20px auto; background: #000; aspect-ratio: 16/9; box-shadow: 0 0 20px rgba(255,0,0,0.3); position: relative; }
        iframe, .video-js { width: 100% !important; height: 100% !important; border: none; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(110px, 1fr)); gap: 15px; padding: 20px; max-width: 1100px; margin: 0 auto; }
        .channel-card { background: white; border-radius: 10px; padding: 10px; text-align: center; cursor: pointer; transition: 0.3s; border: 2px solid #ddd; }
        .channel-card:hover { border-color: #ff0000; transform: translateY(-5px); }
        .channel-card img { width: 100%; height: 60px; object-fit: contain; }
        .channel-card p { color: #333; font-size: 11px; margin: 8px 0 0; font-weight: bold; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div class="header">📺 BANGLA VIEW ZONE - LIVE TV</div>

    <div class="player-container">
        <iframe id="yt-player" src="https://www.youtube.com/embed/live_stream?channel=UC_u6v2At6p3-w8YvT2Zpndw" allowfullscreen></iframe>
        <video id="iptv-player" class="video-js vjs-default-skin hidden" controls preload="auto"></video>
    </div>

    <div class="grid-container" id="channel-grid"></div>

    <script>
        const channels = [
            // নিউজ চ্যানেল (অফিশিয়াল ইউটিউব লাইভ লিঙ্ক)
            { name: "Jamuna TV", img: "https://upload.wikimedia.org/wikipedia/en/thumb/e/e0/Jamuna_TV_logo.png/200px-Jamuna_TV_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UC_u6v2At6p3-w8YvT2Zpndw", type: "yt" },
            { name: "Somoy TV", img: "https://upload.wikimedia.org/wikipedia/en/2/26/Somoy_TV_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCIsP6W279isZAsD_CAdWOTw", type: "yt" },
            { name: "Channel 24", img: "https://upload.wikimedia.org/wikipedia/commons/e/e2/Channel_24_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCXvL_n_6UunYvO0Y9B8A88g", type: "yt" },
            { name: "Ekattor TV", img: "https://upload.wikimedia.org/wikipedia/en/c/c3/Ekattor_TV_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCd7N7G7_A2YOfpYp-7uK3kg", type: "yt" },
            { name: "Independent", img: "https://upload.wikimedia.org/wikipedia/en/0/05/Independent_Television_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCpP0S9N-uS7M9y8v_K6v4tQ", type: "yt" },
            { name: "News 24", img: "https://upload.wikimedia.org/wikipedia/en/2/21/News24_Bangladesh_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCG_UshSOn0HCHV_0q8X7Wdg", type: "yt" },
            { name: "DBC News", img: "https://upload.wikimedia.org/wikipedia/en/b/b3/DBC_News_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UC3-C7oKNoX7vD9pWl_3X5_A", type: "yt" },
            { name: "BTV", img: "https://upload.wikimedia.org/wikipedia/en/8/8e/BTV_logo.png", url: "https://www.youtube.com/embed/live_stream?channel=UCf0fD3hD39Y10f_yXp0n_3A", type: "yt" },
            
            // স্পোর্টস চ্যানেল (এখানে আপনার সংগ্রহ করা m3u8 লিঙ্ক বসাবেন)
            { name: "T Sports", img: "https://upload.wikimedia.org/wikipedia/en/c/c5/T_Sports_logo.png", url: "https://livesim.dashif.org/livesim/testpic_2s/Manifest.m3u8", type: "m3u" },
            { name: "Star Sports 1", img: "https://upload.wikimedia.org/wikipedia/en/thumb/8/85/Star_Sports_logo.svg/200px-Star_Sports_logo.svg.png", url: "https://livesim.dashif.org/livesim/testpic_2s/Manifest.m3u8", type: "m3u" },
            { name: "A Sports", img: "https://upload.wikimedia.org/wikipedia/en/1/13/A_Sports_logo.png", url: "https://livesim.dashif.org/livesim/testpic_2s/Manifest.m3u8", type: "m3u" },
            { name: "Bein Sports", img: "https://upload.wikimedia.org/wikipedia/commons/3/30/BeIN_Sports_logo.svg", url: "https://livesim.dashif.org/livesim/testpic_2s/Manifest.m3u8", type: "m3u" }
        ];

        const grid = document.getElementById('channel-grid');
        const ytPlayer = document.getElementById('yt-player');
        const iptvElement = document.getElementById('iptv-player');
        const vjsPlayer = videojs('iptv-player');

        channels.forEach(ch => {
            const card = document.createElement('div');
            card.className = 'channel-card';
            card.innerHTML = `<img src="${ch.img}"><p>${ch.name}</p>`;
            card.onclick = () => {
                if(ch.type === "yt") {
                    iptvElement.classList.add('hidden');
                    ytPlayer.classList.remove('hidden');
                    ytPlayer.src = ch.url;
                    vjsPlayer.pause();
                } else {
                    ytPlayer.classList.add('hidden');
                    iptvElement.classList.remove('hidden');
                    vjsPlayer.src({ src: ch.url, type: 'application/x-mpegURL' });
                    vjsPlayer.play();
                }
                window.scrollTo({ top: 0, behavior: 'smooth' });
            };
            grid.appendChild(card);
        });
    </script>
</body>
</html>
