<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bangla View Zone - Live TV</title>
    <style>
        body { background-color: #0c0c0c; color: white; font-family: 'Segoe UI', Arial, sans-serif; margin: 0; padding: 0; }
        
        .header { background: #1a1a1a; padding: 20px; text-align: center; font-size: 26px; font-weight: bold; border-bottom: 4px solid #ff0000; color: #fff; box-shadow: 0 4px 15px rgba(255,0,0,0.5); }

        /* ভিডিও প্লেয়ার */
        .player-section { width: 95%; max-width: 900px; margin: 20px auto; background: #000; aspect-ratio: 16/9; border-radius: 15px; overflow: hidden; border: 2px solid #444; }
        iframe { width: 100%; height: 100%; border: none; }

        /* অ্যাডভার্টাইজমেন্ট সেকশন */
        .ad-space { width: 95%; max-width: 900px; height: 100px; margin: 15px auto; background: #222; border: 2px dashed #ff0; display: flex; align-items: center; justify-content: center; color: #ff0; font-weight: bold; border-radius: 10px; }

        /* ক্যাটাগরি স্টাইল */
        .category-title { padding-left: 30px; margin-top: 30px; font-size: 24px; color: #ff0000; border-left: 5px solid #ff0000; text-transform: uppercase; }

        /* গ্রিড কন্টেইনার */
        .grid-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; padding: 20px 30px; }

        /* চ্যানেল বাটন ডিজাইন */
        .channel-card {
            background: linear-gradient(145deg, #ffffff, #e6e6e6);
            border-radius: 12px; padding: 20px 10px; text-align: center; cursor: pointer;
            transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            border: 3px solid transparent; box-shadow: 0 6px 12px rgba(0,0,0,0.4);
        }

        /* ইউনিক রেইনবো পপ-আপ */
        .channel-card:hover {
            transform: scale(1.1) translateY(-10px);
            animation: rainbowGlow 1.5s linear infinite;
        }

        @keyframes rainbowGlow {
            0% { border-color: #ff0000; box-shadow: 0 0 20px #ff0000; }
            33% { border-color: #00ff00; box-shadow: 0 0 20px #00ff00; }
            66% { border-color: #0000ff; box-shadow: 0 0 20px #0000ff; }
            100% { border-color: #ff00ff; box-shadow: 0 0 20px #ff00ff; }
        }

        /* চ্যানেলের বড় টেক্সট */
        .channel-card p { color: #000; font-size: 16px; margin: 0; font-weight: 900; word-wrap: break-word; }
        .channel-card .logo-text { font-size: 22px; color: #ff0000; display: block; margin-bottom: 5px; }

    </style>
</head>
<body>

    <div class="header">📺 BANGLA VIEW ZONE - LIVE TV</div>

    <div class="player-section">
        <iframe id="tv-player" src="https://www.youtube.com/embed/live_stream?channel=UC_u6v2At6p3-w8YvT2Zpndw" allow="autoplay; encrypted-media" allowfullscreen></iframe>
    </div>

    <div class="ad-space">
        YOUR AD CODE HERE (এড বসানোর জায়গা)
    </div>

    <div class="category-title">News Channels (নিউজ)</div>
    <div class="grid-container" id="news-grid"></div>

    <div class="category-title">Entertainment (বিনোদন)</div>
    <div class="grid-container" id="ent-grid"></div>

    <div class="category-title">Sports (খেলাধুলা)</div>
    <div class="grid-container" id="sports-grid"></div>

    <script>
        const news = [
            { name: "JAMUNA TV", id: "UC_u6v2At6p3-w8YvT2Zpndw" },
            { name: "SOMOY TV", id: "UCIsP6W279isZAsD_CAdWOTw" },
            { name: "CHANNEL 24", id: "UCXvL_n_6UunYvO0Y9B8A88g" },
            { name: "EKATTOR TV", id: "UCd7N7G7_A2YOfpYp-7uK3kg" },
            { name: "INDEPENDENT", id: "UCpP0S9N-uS7M9y8v_K6v4tQ" },
            { name: "NEWS 24", id: "UCG_UshSOn0HCHV_0q8X7Wdg" },
            { name: "DBC NEWS", id: "UC3-C7oKNoX7vD9pWl_3X5_A" },
            { name: "BTV LIVE", id: "UCf0fD3hD39Y10f_yXp0n_3A" }
        ];

        const entertainment = [
            { name: "NTV LIVE", id: "UCPn6l09_pXpL4_4hXF6XlJQ" },
            { name: "DEEPTO TV", id: "UC4pA57I6W_L972r7_H0Xv8w" },
            { name: "MAASRANGA", id: "UC86V9mG32I8mO6pP-7C7X4w" },
            { name: "STAR JALSHA", id: "UCBfIunZ5u-v5qU5kI0u_E7Q" },
            { name: "ZEE BANGLA", id: "UC7Z5lW2nKx-W070oQ7C7-Yg" },
            { name: "PEACE TV", id: "UCqG2S1098O8S7S9mO_O6V8g" }
        ];

        const sports = [
            { name: "T SPORTS", id: "UCv_v96YatZUpKqU7f0mO0_Q" },
            { name: "STAR SPORTS", id: "UCId9Xm8E9G5Ww0P_E6UoP9A" },
            { name: "ESPN LIVE", id: "UCiWLfBeV-xvI-eGeS1n-3Sg" },
            { name: "A SPORTS", id: "UC_uVp9iG0xT5-J0G8nO7S5g" }
        ];

        function createCards(data, containerId) {
            const container = document.getElementById(containerId);
            data.forEach(ch => {
                const card = document.createElement('div');
                card.className = 'channel-card';
                card.innerHTML = `<span class="logo-text">📺</span><p>${ch.name}</p>`;
                card.onclick = () => {
                    document.getElementById('tv-player').src = `https://www.youtube.com/embed/live_stream?channel=${ch.id}&autoplay=1`;
                    window.scrollTo({ top: 0, behavior: 'smooth' });
                };
                container.appendChild(card);
            });
        }

        createCards(news, 'news-grid');
        createCards(entertainment, 'ent-grid');
        createCards(sports, 'sports-grid');
    </script>
</body>
</html>
